---
blocky__version: v0.28.2
blocky__arch: "{{ ansible_facts.machine }}"
blocky__system: "{{ ansible_facts.system }}"
blocky__base_url: https://github.com/0xERR0R/blocky/releases/download
blocky__download_url: "{{ blocky__base_url }}/{{ blocky__version }}/blocky_{{ blocky__version }}_{{ blocky__system }}_{{ blocky__arch }}.tar.gz"
blocky__checksum_url: "{{ blocky__base_url }}/{{ blocky__version }}/blocky_checksums.txt"
blocky__download_path: /tmp
blocky__install_path: /opt/blocky
blocky__readiness_check_enabled: true

blocky__caching_min_time: 5m
blocky__caching_max_time: 60m
blocky__caching_max_items_count: 0
blocky__caching_prefetching: false
blocky__caching_prefetch_expires: 2h
blocky__caching_prefetch_threshold: 5
blocky__caching_prefetch_max_items_count: 0
blocky__caching_cache_time_negative: 30m
blocky__caching_exclude: []
  # - /.*\.lan$/
  # - /.*\.local$/
  # - /.*\.host\.com\.(jp|fr)$/

blocky__blocking_client_groups_block:
  default:
    - ads
    - malware

blocky__blocking_blacklists:
  ads:
    - https://raw.githubusercontent.com/StevenBlack/hosts/master/hosts
    - https://raw.githubusercontent.com/notracking/hosts-blocklists/master/hostnames.txt
    - https://s3.amazonaws.com/lists.disconnect.me/simple_ad.txt
    - https://blocklistproject.github.io/Lists/ads.txt
    - https://raw.githubusercontent.com/hagezi/dns-blocklists/main/domains/pro.txt
  malware:
    - https://blocklistproject.github.io/Lists/malware.txt
    - https://blocklistproject.github.io/Lists/ransomware.txt
    - https://blocklistproject.github.io/Lists/scam.txt
    - https://blocklistproject.github.io/Lists/phishing.txt

blocky__blocking_whitelists:
  ads:
    - https://raw.githubusercontent.com/anudeepND/whitelist/master/domains/whitelist.txt
#   - |
#     www.googleadservices.com

blocky__ports_dns: 53
blocky__ports_http: 4000
blocky__ports_tls: ""
blocky__ports_https: ""

blocky__log_level: info

blocky__upstreams:
  default:
    - 9.9.9.9
    - 149.112.112.112
    - 1.1.1.1
    - 1.0.0.1

blocky__config_template: config.yaml.j2

blocky__custom_dns: {}
# web1.example.com: 10.100.1.2

blocky__custom_domain_fallback_upstream: false
blocky__custom_domain: {}
# lan: 10.100.1.1

# Add hosts from inventory to blocky custom dns (default=false)
blocky__hosts_dns_enabled: false
# Which inventory group for adding hosts
blocky__hosts_dns_invenory_group: all
# NOTE: to ignore an host, add `blocky__hosts_dns_ignore=true` to its host_vars
blocky__hosts_dns_ignore: false
# Optional domain to append to the custom DNS entry.
# NOTE: also add the "." add the beginning e.g. .exmaple.com
blocky__hosts_dns_domain: ""
# NOTE: ansible_host must be an IPv4
blocky__hosts_dns_host_ip_var: "ansible_host"

# SSL certificate file. blocky__key_file must be set as well for this to have any effect.
blocky__cert_file: ""
# SSL key file.  blocky__cert_file must be set as well for this to have any effect.
blocky__key_file: ""
# Minimum TLS version blocky is serving
blocky__min_tls_version: ""

blocky__redis: {}

blocky__bootstrap_dns: {}

# Query logging - https://0xerr0r.github.io/blocky/latest/configuration/#query-logging
# Set blocky__query_log_type to enable query logging.
# Supported types: mysql, postgresql, timescale, csv, csv-client, console, none
# Leave empty to disable the queryLog section entirely.
blocky__query_log_type: ""
# Database connection string (for mysql/postgresql/timescale) or directory path (for csv/csv-client).
blocky__query_log_target: ""
# Delete log entries older than this many days. 0 = keep forever.
blocky__query_log_log_retention_days: 0
# Maximum number of attempts to create the log writer on startup.
blocky__query_log_creation_attempts: 3
# Cooldown duration between log writer creation retry attempts.
blocky__query_log_creation_cooldown: 2s
# Fields to include in log entries. Empty list = log all fields.
# Valid values: clientIP, clientName, responseReason, responseAnswer, question, duration
blocky__query_log_fields: []
# How often to flush buffered data to the external database (database types only).
blocky__query_log_flush_interval: 30s
